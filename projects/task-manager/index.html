<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; }

    :root {
      --primary: #6366f1;
      --secondary: #06b6d4;
      --success: #10b981;
      --danger: #ef4444;
      --bg-dark: #0a0a0f;
      --bg-card: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
    }

    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }

    header { text-align: center; margin-bottom: 40px; }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p { color: #64748b; }

    /* Add Task Form */
    .task-form {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    .task-input {
      flex: 1;
      padding: 15px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
    }

    .task-input:focus { outline: none; border-color: var(--primary); }

    .add-btn {
      padding: 15px 30px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .add-btn:hover { transform: scale(1.02); }

    /* Stats */
    .task-stats {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat {
      padding: 15px 25px;
      background: var(--bg-card);
      border-radius: 10px;
      font-weight: 600;
    }

    .stat span { color: var(--primary); }

    /* Task List */
    .task-list { list-style: none; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 15px;
      transition: all 0.2s;
    }

    .task-item:hover { border-color: var(--primary); }

    .task-item.completed { opacity: 0.6; }

    .task-item.completed .task-text { text-decoration: line-through; }

    .checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .checkbox:hover { border-color: var(--primary); }

    .task-item.completed .checkbox {
      background: var(--success);
      border-color: var(--success);
    }

    .checkbox::after {
      content: '✓';
      color: white;
      font-size: 14px;
      display: none;
    }

    .task-item.completed .checkbox::after { display: block; }

    .task-text { flex: 1; font-size: 16px; }

    .delete-btn {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 20px;
      cursor: pointer;
      padding: 5px;
      transition: transform 0.2s;
    }

    .delete-btn:hover { transform: scale(1.2); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }

    .empty-state span { font-size: 60px; display: block; margin-bottom: 20px; }

    @media (max-width: 600px) {
      .task-form { flex-direction: column; }
      .task-stats { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Task Manager</h1>
      <p>Stay organized and get things done</p>
    </header>

    <form class="task-form" onsubmit="addTask(event)">
      <input type="text" class="task-input" id="taskInput" placeholder="Add a new task..." required>
      <button type="submit" class="add-btn">Add Task</button>
    </form>

    <div class="task-stats">
      <div class="stat">Total: <span id="totalTasks">0</span></div>
      <div class="stat">Completed: <span id="completedTasks">0</span></div>
    </div>

    <ul class="task-list" id="taskList"></ul>
  </div>

  <script>
    // Load tasks from localStorage
    let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

    function renderTasks() {
      const taskList = document.getElementById('taskList');

      if (tasks.length === 0) {
        taskList.innerHTML = `
          <div class="empty-state">
            <span>📝</span>
            <p>No tasks yet. Add your first task above!</p>
          </div>
        `;
      } else {
        taskList.innerHTML = tasks.map((task, index) => `
          <li class="task-item ${task.completed ? 'completed' : ''}">
            <div class="checkbox" onclick="toggleTask(${index})"></div>
            <span class="task-text">${task.text}</span>
            <button class="delete-btn" onclick="deleteTask(${index})">&times;</button>
          </li>
        `).join('');
      }

      updateStats();
      saveTasks();
    }

    function addTask(e) {
      e.preventDefault();
      const input = document.getElementById('taskInput');
      const text = input.value.trim();

      if (text) {
        tasks.push({ text, completed: false });
        input.value = '';
        renderTasks();
      }
    }

    function toggleTask(index) {
      tasks[index].completed = !tasks[index].completed;
      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      renderTasks();
    }

    function updateStats() {
      const total = tasks.length;
      const completed = tasks.filter(t => t.completed).length;

      document.getElementById('totalTasks').textContent = total;
      document.getElementById('completedTasks').textContent = completed;
    }

    function saveTasks() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    renderTasks();
  </script>
</body>
</html>
